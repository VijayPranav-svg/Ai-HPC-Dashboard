name: ai_hpc_dashboard
description: AI-HPC Solver Dashboard for Poisson Systems

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  fl_chart: ^0.65.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
